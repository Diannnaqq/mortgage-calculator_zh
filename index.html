<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>房贷提前还款计算器</title>
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-label="房贷计算器">
        <header class="topbar">
          <div>
            <h1>房贷还款计算器</h1>
            <p class="title-spacer" aria-hidden="true">&nbsp;</p>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" id="exportButton" type="button" aria-label="导出Excel">
              导出Excel
            </button>
            <button class="ghost-button" id="resetButton" type="button" aria-label="重置参数">
              重置
            </button>
          </div>
        </header>

        <div class="layout">
          <form class="panel controls" id="loanForm">
            <fieldset>
              <legend>贷款信息</legend>
              <label>
                贷款类型
                <select id="loanType">
                  <option value="commercial">商业贷款</option>
                  <option value="fund">公积金贷款</option>
                  <option value="combo">组合贷款</option>
                </select>
              </label>
              <div class="loan-parts">
                <div class="loan-part" data-part="commercial">
                  <div class="part-title">商业贷款</div>
                  <label>
                    贷款本金
                    <span class="input-with-unit">
                      <input id="commercialPrincipal" type="number" min="0" step="0.01" value="100" />
                      <span>万元</span>
                    </span>
                  </label>
                  <label>
                    年利率
                    <span class="input-with-unit">
                      <input id="commercialRate" type="number" min="0" step="0.01" value="3.45" />
                      <span>%</span>
                    </span>
                  </label>
                </div>
                <div class="loan-part" data-part="fund">
                  <div class="part-title">公积金贷款</div>
                  <label>
                    贷款本金
                    <span class="input-with-unit">
                      <input id="fundPrincipal" type="number" min="0" step="0.01" value="60" />
                      <span>万元</span>
                    </span>
                  </label>
                  <label>
                    年利率
                    <span class="input-with-unit">
                      <input id="fundRate" type="number" min="0" step="0.01" value="2.85" />
                      <span>%</span>
                    </span>
                  </label>
                </div>
              </div>
              <label>
                贷款日期
                <input id="loanDate" type="month" />
              </label>
              <label>
                贷款年限
                <span class="input-with-unit">
                  <input id="years" type="number" min="1" max="40" step="1" value="30" />
                  <span>年</span>
                </span>
              </label>
              <label>
                还款方式
                <select id="repaymentType">
                  <option value="equalPayment">等额本息</option>
                  <option value="equalPrincipal">等额本金</option>
                </select>
              </label>
            </fieldset>

            <fieldset>
              <legend>提前还款</legend>
              <label>
                已还期数
                <span class="input-with-unit">
                  <input id="paidMonths" type="number" min="0" step="1" value="0" />
                  <span>期</span>
                </span>
              </label>
              <div class="prepayment-editor">
                <div class="editor-heading">
                  <span>提前还款计划</span>
                  <button class="mini-button" id="addPrepaymentButton" type="button">新增</button>
                </div>
                <div class="prepayment-list" id="prepaymentList"></div>
              </div>
            </fieldset>
          </form>

          <section class="results" aria-live="polite">
            <div class="metrics-grid">
              <article class="metric primary">
                <span>预计节省利息</span>
                <strong id="interestSaved">--</strong>
              </article>
              <article class="metric">
                <span>原总利息</span>
                <strong id="originalInterest">--</strong>
              </article>
              <article class="metric">
                <span>提前还款后总利息</span>
                <strong id="newInterest">--</strong>
              </article>
              <article class="metric">
                <span>提前还款后剩余时间</span>
                <strong id="newRemainingMonths">--</strong>
              </article>
            </div>

            <div class="panel comparison">
              <div>
                <span>当前剩余本金</span>
                <strong id="remainingBefore">--</strong>
              </div>
              <div>
                <span>首次提前后本金</span>
                <strong id="remainingAfter">--</strong>
              </div>
              <div>
                <span>原下一期月供</span>
                <strong id="nextOriginalPayment">--</strong>
              </div>
              <div>
                <span>新下一期月供</span>
                <strong id="nextNewPayment">--</strong>
              </div>
            </div>

            <section class="panel chart-panel">
              <div class="section-heading">
                <h2>利息对比</h2>
                <span id="chartCaption">--</span>
              </div>
              <div class="bar-chart" aria-label="原方案与提前还款方案利息对比">
                <div class="bar-row">
                  <span>原方案</span>
                  <div class="bar-track"><div id="originalBar" class="bar original"></div></div>
                  <strong id="originalBarValue">--</strong>
                </div>
                <div class="bar-row">
                  <span>新方案</span>
                  <div class="bar-track"><div id="newBar" class="bar updated"></div></div>
                  <strong id="newBarValue">--</strong>
                </div>
              </div>
            </section>

            <section class="panel schedule-panel">
              <div class="section-heading">
                <h2>还款计划</h2>
                <div class="tabs" role="tablist" aria-label="计划切换">
                  <button class="tab active" id="originalTab" type="button">原计划</button>
                  <button class="tab" id="newTab" type="button">新计划</button>
                </div>
              </div>
              <div class="table-wrap">
                <table>
                  <colgroup>
                    <col class="period-col" />
                    <col />
                    <col />
                    <col />
                    <col />
                  </colgroup>
                  <thead>
                    <tr>
                      <th>年月</th>
                      <th>月供</th>
                      <th>本金</th>
                      <th>利息</th>
                      <th>剩余本金</th>
                    </tr>
                  </thead>
                  <tbody id="scheduleBody"></tbody>
                </table>
              </div>
            </section>

            <section class="panel detail-panel">
              <div class="section-heading">
                <h2>新计划明细</h2>
              </div>
              <div class="table-wrap detail-table-wrap">
                <table class="detail-table">
                  <colgroup>
                    <col class="period-col" />
                    <col />
                    <col />
                    <col />
                    <col />
                    <col />
                  </colgroup>
                  <thead>
                    <tr>
                      <th>年月</th>
                      <th>月供</th>
                      <th>商贷本金</th>
                      <th>商贷利息</th>
                      <th>公积金本金</th>
                      <th>公积金利息</th>
                    </tr>
                  </thead>
                  <tbody id="newDetailBody"></tbody>
                </table>
              </div>
            </section>
          </section>
        </div>
      </section>
    </main>
    <script src="app.js?v=5"></script>
  </body>
</html>
